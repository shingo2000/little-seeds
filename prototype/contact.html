<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | little seeds photography</title>
    <meta name="description" content="little seeds photographyへのご予約・お問い合わせはこちらのフォームからお気軽にどうぞ。">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@300;400;500&family=Sawarabi+Mincho&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>

<body>

    <header class="header">
        <div class="header__inner">
            <a href="index.html" class="header__logo">little seeds photography</a>
        </div>
    </header>

    <main>
        <section class="section contact-page">
            <div class="container">
                <h1 class="section__title">Contact</h1>
                <p class="section__subtitle">お問い合わせ</p>

                <div class="contact-form__note">
                    <p>通常、お問い合わせは24時間以内に返信いたします。<br>メールが届かない場合はお手数ですが、LINEへ直接ご連絡ください。</p>
                    <p class="contact-form__note-line"><a href="https://line.me/R/ti/p/@561ignlm" target="_blank" rel="noopener noreferrer">LINEでのお問い合わせはこちら</a></p>
                </div>

                <form action="https://api.web3forms.com/submit" method="POST" class="contact-form">
                    <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
                    <input type="hidden" name="subject" value="little seeds photography お問い合わせ">
                    <input type="hidden" name="from_name" value="little seeds photography">
                    <input type="checkbox" name="botcheck" class="contact-form__honeypot" style="display: none;">

                    <div class="contact-form__group">
                        <label for="inquiry_type" class="contact-form__label">お問い合わせ内容 <span class="contact-form__required">必須</span></label>
                        <select id="inquiry_type" name="inquiry_type" required class="contact-form__select">
                            <option value="" disabled selected>選択してください</option>
                            <option value="撮影について">撮影について</option>
                            <option value="プランについて">プランについて</option>
                            <option value="日程のお問い合わせ">日程のお問い合わせ</option>
                            <option value="その他">その他</option>
                        </select>
                    </div>

                    <div class="contact-form__group">
                        <label for="name" class="contact-form__label">お名前 <span class="contact-form__required">必須</span></label>
                        <input type="text" id="name" name="name" required class="contact-form__input">
                    </div>

                    <div class="contact-form__group">
                        <label for="email" class="contact-form__label">メールアドレス <span class="contact-form__required">必須</span></label>
                        <input type="email" id="email" name="email" required class="contact-form__input">
                    </div>

                    <div class="contact-form__group">
                        <label for="due_date" class="contact-form__label">出産予定日</label>
                        <input type="text" id="due_date" name="due_date" class="contact-form__input">
                    </div>

                    <div class="contact-form__group">
                        <label for="area" class="contact-form__label">ご自宅エリア</label>
                        <input type="text" id="area" name="area" class="contact-form__input">
                    </div>

                    <div class="contact-form__group">
                        <label for="phone" class="contact-form__label">電話番号</label>
                        <input type="tel" id="phone" name="phone" class="contact-form__input">
                    </div>

                    <div class="contact-form__group">
                        <label for="message" class="contact-form__label">お問い合わせ詳細 <span class="contact-form__required">必須</span></label>
                        <textarea id="message" name="message" required class="contact-form__textarea" rows="6"></textarea>
                    </div>

                    <button type="submit" class="contact-form__submit">Send</button>
                </form>

                <div class="contact-page__back">
                    <a href="index.html">トップページに戻る</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p class="copyright">&copy; little seeds photography</p>
    </footer>

</body>

</html>
