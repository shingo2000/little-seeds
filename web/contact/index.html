    <style>
    /* クリティカルCSS: root変数、リセット、ヘッダー、メニュー、セクション共通、ヒーロー */
    :root {
        --color-bg: #ffffff;
        --color-bg-warm: #ede8e2;
        --color-text: #111111;
        --color-text-subtle: #666666;
        --color-border: #e0e0e0;
        --color-accent: #c45c5c;
        --font-en: 'Quicksand', sans-serif;
        --font-ja: 'Hiragino Kaku Gothic ProN', 'Hiragino Kaku Gothic Pro',
            'Hiragino Sans', 'Noto Sans JP', 'BIZ UDPGothic',
            'Meiryo', 'Yu Gothic Medium', sans-serif;
        --font-size-s: 13px;
        --font-size-m: 15px;
        --font-size-l: 18px;
        --font-size-xl: 24px;
        --font-size-2xl: 32px;
        --space-0_5: 4px;
        --space-1: 8px;
        --space-2: 16px;
        --space-3: 24px;
        --space-4: 40px;
        --space-5: 64px;
        --radius-card: 16px;
        --radius-banner: 8px;
        --header-height: 60px;
        --side-padding: 20px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--font-ja);color:var(--color-text);background-color:var(--color-bg);line-height:1.8;letter-spacing:0.08em;font-weight:300;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
    img{max-width:100%;height:auto;display:block}
    a{text-decoration:none;color:inherit;transition:opacity 0.3s ease}
    a:hover{opacity:0.7}
    ul,ol,dl{list-style:none}
    .header{position:fixed;top:0;left:0;width:100%;height:var(--header-height);background-color:transparent;z-index:100}
    .header__inner{display:flex;justify-content:flex-end;align-items:center;height:100%;padding:0 var(--side-padding)}
    .header__menu-btn{display:flex;align-items:center;justify-content:center;width:30px;height:30px;background:none;border:none;cursor:pointer;z-index:101}
    .menu-overlay{position:fixed;top:0;left:0;width:100%;height:100vh;height:100dvh;background-color:var(--color-bg-warm);z-index:200;display:flex;flex-direction:column;justify-content:center;padding:0 var(--space-4);opacity:0;visibility:hidden;pointer-events:none;transition:opacity 0.4s ease,visibility 0.4s ease}
    .menu-overlay.is-open{opacity:1;visibility:visible;pointer-events:auto}
    .menu-overlay__header{position:absolute;top:0;right:0;display:flex;justify-content:flex-end;align-items:center;height:var(--header-height);padding:0 var(--side-padding)}
    .menu-overlay__close-btn{display:flex;align-items:center;justify-content:center;width:30px;height:30px;background:none;border:none;cursor:pointer}
    .menu-overlay__list{display:flex;flex-direction:column;gap:20px}
    .menu-overlay__item a{display:block}
    .menu-overlay__en{display:block;font-family:var(--font-en);font-size:var(--font-size-xl);font-weight:300;letter-spacing:0.06em;line-height:1.2}
    .menu-overlay__ja{display:block;font-size:var(--font-size-s);color:var(--color-text-subtle);letter-spacing:0.13em;margin-top:var(--space-0_5)}
    .section{padding:var(--space-5) var(--side-padding)}
    .section--warm{background-color:var(--color-bg-warm)}
    .section__heading{text-align:center;margin-bottom:var(--space-4)}
    .section__title{font-family:var(--font-en);font-size:var(--font-size-2xl);font-weight:300;letter-spacing:0.06em;line-height:1.1;color:var(--color-text)}
    .section__subtitle{font-size:var(--font-size-s);color:var(--color-text-subtle);letter-spacing:0.13em;margin-top:var(--space-1);line-height:1.4}
    .section__image-wrapper{margin-bottom:var(--space-4)}
    .section__image{width:100%;object-fit:cover;aspect-ratio:4/3}
    .hero{padding-top:calc(var(--header-height) + var(--space-4));padding-left:var(--side-padding);padding-right:var(--side-padding);padding-bottom:0}
    .hero__content{margin-bottom:var(--space-4)}
    .hero__title{font-family:var(--font-en);font-size:var(--font-size-2xl);font-weight:300;letter-spacing:0.06em;line-height:1.1;color:var(--color-text)}

    .hero__slide{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1s ease-in-out}

<body>

    <main>
        <section class="section contact-page">
            <div class="section__heading">
                <h1 class="section__title">Contact</h1>
                <p class="section__subtitle">お問い合わせ</p>
            </div>

            <div class="contact-form__note">
                <p>通常、お問い合わせは2日以内に返信いたします。メールが届かない場合はお手数ですが、LINEへ直接ご連絡ください。</p>
                <p><a href="https://lin.ee/HhGJII7" class="contact-form__note-link" target="_blank" rel="noopener noreferrer">LINEでのお問い合わせはこちら</a></p>
            </div>

            <form action="https://api.web3forms.com/submit" method="POST" class="contact-form" novalidate>
                <input type="hidden" name="access_key" value="544f5db8-1184-4d3e-91dc-075fbeb7c3fb">
                <input type="hidden" name="subject" value="little seeds photography お問い合わせ">
                <input type="hidden" name="from_name" value="little seeds photography">
                <input type="hidden" name="redirect" value="https://little-seeds.ayako-suzuki.net/contact/thanks.html">
                <input type="checkbox" name="botcheck" style="display: none;">

                <div class="contact-form__group">
                    <label for="name" class="contact-form__label">お名前 <span class="contact-form__required">必須</span></label>
                    <input type="text" id="name" name="お名前" required class="contact-form__input">
                    <p class="contact-form__error" id="name-error" hidden></p>
                </div>

                <div class="contact-form__group">
                    <label for="email" class="contact-form__label">メールアドレス <span class="contact-form__required">必須</span></label>
                    <input type="email" id="email" name="メールアドレス" required class="contact-form__input">
                    <p class="contact-form__error" id="email-error" hidden></p>
                </div>

                <div class="contact-form__group">
                    <label for="due_date" class="contact-form__label">出産予定日</label>
                    <input type="date" id="due_date" name="出産予定日" class="contact-form__input">
                </div>

                <div class="contact-form__group">
                    <label for="area" class="contact-form__label">お住まいのエリア</label>
                    <input type="text" id="area" name="お住まいのエリア" class="contact-form__input">
                </div>

                <div class="contact-form__group">
                    <label for="phone" class="contact-form__label">電話番号</label>
                    <input type="tel" id="phone" name="電話番号" class="contact-form__input">
                </div>

                <div class="contact-form__group">
                    <label for="message" class="contact-form__label">お問い合わせ内容 <span class="contact-form__required">必須</span></label>
                    <textarea id="message" name="お問い合わせ内容" required class="contact-form__textarea"></textarea>
                    <p class="contact-form__error" id="message-error" hidden></p>
                </div>

                <button type="submit" class="contact__btn contact-form__submit">送信</button>
            </form>

            <div class="contact-page__back">
                <a href="../" class="contact__link">トップページに戻る</a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p class="footer__copyright">&copy; little seeds photography</p>
    </footer>

    <script>
    (function () {
        const form = document.querySelector('.contact-form');
        const fields = [
            { id: 'name', message: 'お名前を入力してください。' },
            { id: 'email', message: 'メールアドレスを入力してください。', formatMessage: '正しいメールアドレスを入力してください。' },
            { id: 'message', message: 'お問い合わせ内容を入力してください。' },
        ];

        function showError(field, message) {
            const input = document.getElementById(field.id);
            const error = document.getElementById(field.id + '-error');
            input.classList.add('is-invalid');
            error.textContent = message;
            error.hidden = false;
        }

        function clearError(field) {
            const input = document.getElementById(field.id);
            const error = document.getElementById(field.id + '-error');
            input.classList.remove('is-invalid');
            error.textContent = '';
            error.hidden = true;
        }

        function validateField(field) {
            const input = document.getElementById(field.id);
            const value = input.value.trim();

            if (!value) {
                showError(field, field.message);
                return false;
            }

            if (field.id === 'email' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) {
                showError(field, field.formatMessage);
                return false;
            }

            clearError(field);
            return true;
        }

        form.addEventListener('submit', function (e) {
            let isValid = true;
            fields.forEach(function (field) {
                if (!validateField(field)) {
                    isValid = false;
                }
            });
            if (!isValid) {
                e.preventDefault();
                var firstInvalid = document.querySelector('.is-invalid');
                if (firstInvalid) {
                    firstInvalid.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        });

        fields.forEach(function (field) {
            const input = document.getElementById(field.id);
            input.addEventListener('input', function () {
                validateField(field);
            });
        });
    })();
    </script>
